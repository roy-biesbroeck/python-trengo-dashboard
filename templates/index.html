<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trengo Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #f1f5f9;
      --card:     #ffffff;
      --border:   #e2e8f0;
      --text:     #1e293b;
      --muted:    #4b5563;
      --blue:     #3b82f6;
      --green:    #16a34a;
      --amber:    #d97706;
      --red:      #dc2626;
      --purple:   #8b5cf6;
      --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --radius:   .75rem;
      --focus:    0 0 0 2px var(--card), 0 0 0 4px var(--blue);
      --hover:    #f8fafc;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --success-bg: #dcfce7;
      --success-text: #15803d;

      /* Age colours: fresh → stale */
      --age-0: #3b82f6;
      --age-1: #22c55e;
      --age-2: #84cc16;
      --age-3: #f59e0b;
      --age-4: #f97316;
      --age-5: #ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 1rem 1.5rem .75rem;
      gap: .75rem;
    }

    /* ── Header ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: .625rem; }
    .header-icon {
      width: 2rem; height: 2rem;
      background: var(--blue);
      border-radius: .5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .header h1 {
      font-size: clamp(1rem, 1.3vw, 1.25rem);
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .header-right { display: flex; align-items: center; gap: .875rem; }
    .last-updated { font-size: .75rem; color: var(--muted); }

    .btn-refresh {
      display: flex; align-items: center; gap: .375rem;
      padding: .4rem .875rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .5rem;
      font-size: .75rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background .15s, color .15s, border-color .15s;
    }
    .btn-refresh:hover    { background: var(--blue); color: var(--card); border-color: var(--blue); }
    .btn-refresh:active   { transform: scale(.97); }
    .btn-refresh:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }
    .btn-refresh.spinning svg { animation: spin .7s linear infinite; }

    /* ── Summary strip ───────────────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .75rem;
      flex-shrink: 0;
    }
    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .875rem 1.25rem;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
    }
    .card-total::before   { background: var(--blue); }
    .card-new::before     { background: var(--green); }
    .card-assigned::before{ background: var(--amber); }
    .card-closed::before  { background: var(--purple); }
    .card-closed  .card-value { color: var(--purple);  }

    .net-indicator {
      display: flex;
      align-items: center;
      gap: .25rem;
      font-size: .6875rem;
      font-weight: 700;
      margin-top: .375rem;
      line-height: 1;
    }
    .net-pill {
      display: inline-flex;
      align-items: center;
      gap: .2rem;
      padding: .125rem .4rem;
      border-radius: 999px;
      font-size: .625rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .net-positive .net-pill { background: var(--success-bg); color: var(--success-text); }
    .net-negative .net-pill { background: var(--error-bg); color: var(--red); }
    .net-neutral  .net-pill { background: var(--border); color: var(--muted); }
    .net-label { color: var(--muted); font-weight: 500; }

    .card-label {
      font-size: .625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .375rem;
    }
    .card-value {
      font-size: clamp(1.75rem, 2.5vw, 2.25rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
    }
    .card-total   .card-value { color: var(--blue);  }
    .card-new     .card-value { color: var(--green); }
    .card-assigned .card-value { color: var(--amber); }
    .card-sub { margin-top: .25rem; font-size: .75rem; color: var(--muted); }

    /* ── Main three-column grid ──────────────────────── */
    #main {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .main-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr .85fr;
      gap: .875rem;
      height: 100%;
    }

    /* ── Column ──────────────────────────────────────── */
    .col {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: .4rem;
      flex-shrink: 0;
      margin-bottom: .5rem;
    }
    .section-title { font-size: .875rem; font-weight: 700; }
    .section-header-gap { margin-top: .625rem; }
    .section-badge {
      font-size: .6875rem; font-weight: 600;
      color: var(--muted); background: var(--border);
      padding: .1rem .4rem; border-radius: 999px;
    }

    /* ── Scrollable data card (teams / users) ────────── */
    .data-card {
      flex: 1;
      min-height: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .data-head {
      flex-shrink: 0;
      background: var(--hover);
      border-bottom: 1px solid var(--border);
      font-size: .625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }
    .data-body {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    /* custom scrollbar */
    .data-body::-webkit-scrollbar { width: 4px; }
    .data-body::-webkit-scrollbar-track { background: transparent; }
    .data-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* ── Teams rows ──────────────────────────────────── */
    .data-head.t-head,
    .team-row {
      display: grid;
      grid-template-columns: 1fr 80px 80px 80px;
      align-items: center;
      padding: .5625rem 1.125rem;
      gap: .25rem;
    }
    .team-row {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .team-row:last-child { border-bottom: none; }
    .team-row:hover { background: var(--hover); }

    .team-name-wrap { display: flex; align-items: center; gap: .5rem; overflow: hidden; min-width: 0; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .dot.has-new { background: var(--green); }
    .team-name {
      font-weight: 600; font-size: .875rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .col-r { text-align: right; }
    .num { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .num.n-total    { color: var(--blue);  }
    .num.n-new      { color: var(--green); }
    .num.n-assigned { color: var(--amber); }

    .mini-bar {
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      margin-top: .25rem;
      overflow: hidden;
    }
    .mini-fill { height: 100%; border-radius: 999px; background: var(--blue); }

    /* ── User rows ───────────────────────────────────── */
    .data-head.u-head,
    .user-row {
      display: grid;
      grid-template-columns: 1fr 64px;
      align-items: center;
      padding: .5rem 1.125rem;
    }
    .user-row {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: var(--hover); }

    .user-name-wrap { display: flex; align-items: center; gap: .5rem; overflow: hidden; }
    .avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .5625rem; font-weight: 700;
      color: var(--card); flex-shrink: 0;
      letter-spacing: .02em;
    }
    .user-name {
      font-weight: 600; font-size: .875rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Age card ────────────────────────────────────── */
    .age-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .age-stacked {
      display: flex;
      height: 8px;
    }
    .age-stacked > div { transition: flex .5s ease; }

    .age-list {
      padding: .75rem 1.125rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .age-item {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .age-swatch {
      width: 9px; height: 9px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .age-name {
      flex: 1;
      font-size: .8rem;
      color: var(--text);
    }
    .age-sub {
      font-size: .6875rem;
      color: var(--muted);
      min-width: 52px;
    }
    .age-num {
      font-size: .9375rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 32px;
      text-align: right;
      color: var(--text);
    }

    /* ── Loading / Error ─────────────────────────────── */
    .state-box {
      height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .75rem;
      color: var(--muted); font-size: .9rem;
    }
    .spinner-ring {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .error-box {
      background: var(--error-bg); border: 1px solid var(--error-border);
      color: var(--red); padding: 1rem 1.25rem;
      border-radius: var(--radius); font-size: .875rem;
    }
    .empty { padding: 1.5rem; color: var(--muted); text-align: center; font-size: .875rem; }

    /* ── Screen-reader only ─────────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      flex-shrink: 0;
      font-size: .6875rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }

    /* ── Focus indicators ──────────────────────────── */
    :focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Reduced motion ─────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Responsive: tablet (<1024px) ───────────────── */
    @media (max-width: 1023px) {
      body {
        height: auto;
        min-height: 100dvh;
        overflow: auto;
        padding: .75rem 1rem .75rem;
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .main-grid {
        grid-template-columns: 1fr 1fr;
        height: auto;
      }

      /* Ticket age + trend column spans full width below the two data columns */
      .main-grid > .col:last-child {
        grid-column: 1 / -1;
      }

      #main { overflow: visible; }
      .data-card { max-height: 50vh; }
    }

    /* ── Responsive: mobile (<640px) ─────────────────── */
    @media (max-width: 639px) {
      body { padding: .5rem .75rem .5rem; gap: .5rem; }

      .header { flex-wrap: wrap; gap: .375rem; }
      .header h1 { font-size: 1rem; }
      .header-right { width: 100%; justify-content: space-between; }

      .summary-grid {
        grid-template-columns: 1fr 1fr;
        gap: .5rem;
      }
      .card-value { font-size: 1.5rem; }
      .card-label { font-size: .5625rem; }
      .card-sub { font-size: .625rem; }

      .main-grid {
        grid-template-columns: 1fr;
        gap: .625rem;
      }
      .main-grid > .col:last-child { grid-column: auto; }

      .data-card { max-height: 40vh; }

      .data-head.t-head,
      .team-row {
        grid-template-columns: 1fr 56px 48px 48px;
        padding: .5rem .75rem;
        font-size: .8125rem;
      }

      .data-head.u-head,
      .user-row {
        padding: .4375rem .75rem;
      }

      .footer { font-size: .5625rem; }
    }

    /* ── Trend chart card ────────────────────────────── */
    .trend-card {
      flex: 1;
      min-height: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: .625rem .875rem .75rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .trend-chart-inner {
      position: relative;
      flex: 1;
      min-height: 0;
    }
    .trend-btn {
      padding: .3rem .625rem;
      min-height: 1.75rem;
      border-radius: .3rem;
      font-size: .6875rem; font-weight: 600;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .trend-btn + .trend-btn { margin-left: .3rem; }
    .trend-btn:hover  { background: var(--bg); color: var(--text); }
    .trend-btn:active { transform: scale(.95); }
    .trend-btn.active { background: var(--blue); color: var(--card); border-color: var(--blue); }
    .trend-no-data {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      padding: .75rem;
      color: var(--muted); font-size: .75rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="header-icon" role="img" aria-label="Ticket icoon">🎫</div>
      <h1>Trengo Dashboard</h1>
    </div>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated" aria-live="polite"></span>
      <span class="last-updated" id="closedUpdated"></span>
      <button class="btn-refresh" id="refreshBtn" onclick="loadDashboard()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Vernieuwen
      </button>
    </div>
  </div>

  <div class="summary-grid" id="summary" style="display:none" aria-live="polite">
    <div class="summary-card card-total">
      <div class="card-label">Totaal open</div>
      <div class="card-value" id="s-total">–</div>
      <div class="card-sub">Actieve tickets</div>
    </div>
    <div class="summary-card card-new">
      <div class="card-label">Nieuw</div>
      <div class="card-value" id="s-new">–</div>
      <div class="card-sub">Niet toegewezen</div>
    </div>
    <div class="summary-card card-assigned">
      <div class="card-label">Toegewezen</div>
      <div class="card-value" id="s-assigned">–</div>
      <div class="card-sub">Gekoppeld aan persoon</div>
    </div>
    <div class="summary-card card-closed">
      <div class="card-label">Gesloten</div>
      <div class="card-value" id="s-closed">–</div>
      <div class="card-sub" id="s-closed-sub">dag / week / maand</div>
      <div id="s-closed-net"></div>
    </div>
  </div>

  <div id="main">
    <div class="state-box">
      <div class="spinner-ring"></div>
      <span>Gegevens ophalen…</span>
    </div>
  </div>

  <div class="footer">
    Ververst elke 5 min &nbsp;·&nbsp; Nieuw = niet toegewezen &nbsp;·&nbsp; Toegewezen = gekoppeld aan agent
  </div>

  <script>
    const AVATAR_COLORS = [
      '#2563eb','#7c3aed','#db2777','#0f766e',
      '#b45309','#047857','#4f46e5','#c2410c',
    ];
    const AGE_COLORS = ['var(--age-0)','var(--age-1)','var(--age-2)',
                        'var(--age-3)','var(--age-4)','var(--age-5)'];

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function fmt(iso) {
      return new Date(iso).toLocaleTimeString('nl-NL', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    let closedData = null;

    async function loadClosedData() {
      if (!closedData) {
        const el = document.getElementById('s-closed');
        const sub = document.getElementById('s-closed-sub');
        if (el) el.textContent = '...';
        if (sub) sub.textContent = 'Laden…';
      }
      try {
        const res = await fetch('/api/closed');
        if (!res.ok) return;
        closedData = await res.json();
        renderClosedCard();
      } catch { /* silent */ }
    }

    function renderClosedCard() {
      if (!closedData) return;
      const el = document.getElementById('s-closed');
      const sub = document.getElementById('s-closed-sub');
      if (!el || !sub) return;

      el.textContent = closedData.closed_today;
      sub.textContent = `${esc(String(closedData.closed_today))} / ${esc(String(closedData.closed_week))} / ${esc(String(closedData.closed_month))}`;

      const tsEl = document.getElementById('closedUpdated');
      if (tsEl && closedData.fetched_at) {
        tsEl.textContent = `Gesloten: ${fmt(closedData.fetched_at)}`;
      }
    }

    function renderNetIndicator(newToday) {
      if (!closedData) return;
      const net = closedData.closed_today - newToday;
      const el = document.getElementById('s-closed-net');
      if (!el) return;
      let arrow, cls, label;
      if (net > 0) {
        arrow = `▲ +${net}`;
        cls = 'net-positive';
        label = 'netto gesloten';
      } else if (net < 0) {
        arrow = `▼ ${net}`;
        cls = 'net-negative';
        label = 'netto open';
      } else {
        arrow = '= 0';
        cls = 'net-neutral';
        label = 'netto gelijk';
      }
      el.innerHTML = `<div class="net-indicator ${cls}"><span class="net-pill">${arrow}</span><span class="net-label">${label}</span></div>`;
    }
    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function initials(name) {
      const p = String(name).trim().split(/\s+/);
      return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : String(name).slice(0,2).toUpperCase();
    }
    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }

    function renderTeams(teams) {
      if (!teams.length)
        return `<div class="empty">Geen teams gevonden</div>`;
      const max = Math.max(...teams.map(t => t.total), 1);
      return teams.map(t => {
        const pct = Math.round(t.total / max * 100);
        return `
          <div class="team-row" role="row">
            <div class="team-name-wrap" role="cell">
              <div class="dot ${t.new > 0 ? 'has-new' : ''}" aria-hidden="true"></div>
              <span class="team-name">${esc(t.name)}</span>
              ${t.new > 0 ? `<span class="sr-only">(heeft nieuwe tickets)</span>` : ''}
            </div>
            <div class="col-r" role="cell">
              <div class="num n-total">${t.total}</div>
              <div class="mini-bar" role="img" aria-label="${pct}% van maximum"><div class="mini-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="col-r" role="cell"><span class="num n-new">${t.new}</span></div>
            <div class="col-r" role="cell"><span class="num n-assigned">${t.assigned}</span></div>
          </div>`;
      }).join('');
    }

    function renderUsers(users) {
      if (!users || !users.length)
        return `<div class="empty">Alle tickets zijn verdeeld!</div>`;
      const max = Math.max(...users.map(u => u.assigned), 1);
      return users.map(u => {
        const pct = Math.round(u.assigned / max * 100);
        const color = avatarColor(u.name);
        return `
          <div class="user-row" role="row">
            <div class="user-name-wrap" role="cell">
              <div class="avatar" style="background:${color}" aria-hidden="true">${esc(initials(u.name))}</div>
              <span class="user-name" title="${esc(u.name)}">${esc(u.name)}</span>
            </div>
            <div class="col-r" role="cell">
              <span class="num n-assigned">${u.assigned}</span>
              <div class="mini-bar" role="img" aria-label="${pct}% van maximum"><div class="mini-fill" style="width:${pct}%;background:var(--amber)"></div></div>
            </div>
          </div>`;
      }).join('');
    }

    function renderAge(buckets, total) {
      /* Stacked bar */
      const stackedSegs = buckets.map((b, i) =>
        `<div style="flex:${b.count || 0};background:${AGE_COLORS[i]}" title="${esc(b.label)}: ${b.count}"></div>`
      ).join('');
      const allZero = buckets.every(b => b.count === 0);
      const stackedBar = allZero
        ? `<div style="flex:1;background:var(--border)"></div>`
        : stackedSegs;

      /* List rows */
      const rows = buckets.map((b, i) => `
        <div class="age-item">
          <div class="age-swatch" style="background:${AGE_COLORS[i]}"></div>
          <span class="age-name">${esc(b.label)}</span>
          <span class="age-sub">${esc(b.sublabel)}</span>
          <span class="age-num">${b.count}</span>
        </div>`).join('');

      return `
        <div class="age-stacked">${stackedBar}</div>
        <div class="age-list">${rows}</div>`;
    }

    /* ── Trend chart ────────────────────────────────── */
    let trendChart = null;
    let trendData  = [];
    let trendRange = 7;

    async function loadTrendChart() {
      try {
        const res = await fetch('/api/history');
        if (!res.ok) return;
        trendData = await res.json();
        renderTrendChart();
      } catch { /* silent */ }
    }

    function setTrendRange(days) {
      trendRange = days;
      document.querySelectorAll('.trend-btn').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById(`trend-${days}d`);
      if (btn) btn.classList.add('active');
      renderTrendChart();
    }

    function renderTrendChart() {
      const cutoff   = new Date();
      cutoff.setDate(cutoff.getDate() - trendRange);
      const filtered = trendData.filter(d => new Date(d.ts) >= cutoff);

      const inner  = document.getElementById('trend-chart-inner');
      const noData = document.getElementById('trend-no-data');
      if (!inner) return;

      if (!filtered.length) {
        inner.style.display  = 'none';
        noData.style.display = '';
        if (trendChart) { trendChart.destroy(); trendChart = null; }
        return;
      }
      inner.style.display  = '';
      noData.style.display = 'none';

      const ptRadius = filtered.length > 60 ? 0 : 3;
      const labels   = filtered.map(d =>
        new Date(d.ts).toLocaleString('nl-NL', {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
        })
      );
      const closedDailyCounts = closedData && closedData.daily_counts ? closedData.daily_counts : {};
      const closedValues = filtered.map(d => {
        const dateKey = new Date(d.ts).toLocaleDateString('sv-SE');
        return closedDailyCounts[dateKey] || 0;
      });

      const cBlue   = cssVar('--blue');
      const cGreen  = cssVar('--green');
      const cAmber  = cssVar('--amber');
      const cPurple = cssVar('--purple');
      const cBorder = cssVar('--border');
      const cMuted  = cssVar('--muted');

      const datasets = [
        {
          label: 'Totaal',
          data: filtered.map(d => d.total),
          borderColor: cBlue, backgroundColor: cBlue + '14',
          tension: .35, fill: true, pointRadius: ptRadius, borderWidth: 2,
        },
        {
          label: 'Nieuw',
          data: filtered.map(d => d.open),
          borderColor: cGreen, backgroundColor: 'transparent',
          tension: .35, fill: false, pointRadius: ptRadius, borderWidth: 2,
        },
        {
          label: 'Toegewezen',
          data: filtered.map(d => d.assigned),
          borderColor: cAmber, backgroundColor: 'transparent',
          tension: .35, fill: false, pointRadius: ptRadius, borderWidth: 2,
        },
        {
          label: 'Gesloten',
          data: closedValues,
          borderColor: cPurple, backgroundColor: 'transparent',
          tension: .35, fill: false, pointRadius: ptRadius, borderWidth: 2,
          borderDash: [4, 2],
        },
      ];

      if (trendChart) { trendChart.destroy(); trendChart = null; }

      const canvas = document.getElementById('trend-canvas');
      if (!canvas) return;

      trendChart = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              position: 'top',
              labels: { font: { size: 10 }, boxWidth: 8, padding: 10, color: cMuted },
            },
          },
          scales: {
            x: {
              ticks: {
                font: { size: 9 }, maxRotation: 30,
                autoSkip: true, maxTicksLimit: 8,
                color: cMuted,
              },
              grid: { display: false },
            },
            y: {
              beginAtZero: true,
              ticks: {
                stepSize: 1, font: { size: 9 },
                callback: v => Number.isInteger(v) ? v : null,
                color: cMuted,
              },
              grid: { color: cBorder + '66' },
            },
          },
        },
      });
    }

    /* ── Main render ─────────────────────────────────── */
    function render(data) {
      const { summary, teams, users, age_buckets, last_updated } = data;

      document.getElementById('lastUpdated').textContent = `Bijgewerkt om ${fmt(last_updated)}`;

      /* Summary strip */
      document.getElementById('s-total').textContent    = summary.total;
      document.getElementById('s-new').textContent      = summary.new;
      document.getElementById('s-assigned').textContent = summary.assigned;
      document.getElementById('summary').style.display  = '';
      renderClosedCard();
      renderNetIndicator(summary.new_today || 0);

      /* Destroy old chart before rebuilding DOM */
      if (trendChart) { trendChart.destroy(); trendChart = null; }

      /* Main grid */
      document.getElementById('main').innerHTML = `
        <div class="main-grid">

          <!-- Per team -->
          <div class="col">
            <div class="section-header">
              <span class="section-title">Per team</span>
              <span class="section-badge">${teams.length} team${teams.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="data-card" role="table" aria-label="Tickets per team">
              <div class="data-head t-head" role="row">
                <div role="columnheader">Team</div>
                <div class="col-r" role="columnheader">Totaal</div>
                <div class="col-r" role="columnheader">Nieuw</div>
                <div class="col-r" role="columnheader">Toegewezen</div>
              </div>
              <div class="data-body" role="rowgroup">${renderTeams(teams)}</div>
            </div>
          </div>

          <!-- Per medewerker -->
          <div class="col">
            <div class="section-header">
              <span class="section-title">Per medewerker</span>
              <span class="section-badge">${users ? users.length : 0} agent${!users || users.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="data-card" role="table" aria-label="Tickets per medewerker">
              <div class="data-head u-head" role="row">
                <div role="columnheader">Medewerker</div>
                <div class="col-r" role="columnheader">Toegewezen</div>
              </div>
              <div class="data-body" role="rowgroup">${renderUsers(users)}</div>
            </div>
          </div>

          <!-- Ticket ouderdom + Trend -->
          <div class="col">
            <div class="section-header">
              <span class="section-title">Ticket ouderdom</span>
              <span class="section-badge">${summary.total} tickets</span>
            </div>
            <div class="age-card">
              ${age_buckets ? renderAge(age_buckets, summary.total) : '<div class="empty">Geen data</div>'}
            </div>

            <div class="section-header section-header-gap">
              <span class="section-title">Ticket trend</span>
              <div>
                <button class="trend-btn active" id="trend-7d"  onclick="setTrendRange(7)">7d</button>
                <button class="trend-btn"         id="trend-30d" onclick="setTrendRange(30)">30d</button>
              </div>
            </div>
            <div class="trend-card">
              <div class="trend-chart-inner" id="trend-chart-inner">
                <canvas id="trend-canvas"></canvas>
              </div>
              <div class="trend-no-data" id="trend-no-data" style="display:none">
                Nog geen historische data.<br>Wordt opgeslagen bij elke refresh.
              </div>
            </div>
          </div>

        </div>`;

      loadTrendChart();
    }

    async function loadDashboard() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.classList.add('spinning');

      try {
        const res  = await fetch('/api/dashboard');
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
        render(data);
        loadClosedData().then(() => renderNetIndicator(data.summary.new_today || 0));
      } catch (err) {
        document.getElementById('main').innerHTML = `
          <div class="state-box">
            <div class="error-box"><strong>Fout bij laden:</strong> ${esc(err.message)}</div>
          </div>`;
        document.getElementById('lastUpdated').textContent = '';
      } finally {
        btn.disabled = false;
        btn.classList.remove('spinning');
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 5 * 60 * 1000);
    setInterval(loadClosedData, 30 * 60 * 1000);
  </script>
</body>
</html>
